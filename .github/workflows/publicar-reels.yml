name: publicar-reels

on:
  schedule:
    # ESTRATEGIA: o runner sobe CEDO, em janela ociosa, e o script DORME ate o publish_at exato.
    # REGRAS: (1) NUNCA minuto :00 (topo da hora = mais atrasado/descartado pelo GitHub).
    # (2) NUNCA dentro da janela de pico 09:00-10:00 UTC (jobs sao descartados ali).
    # (3) disparar < 3h antes do publish_at (cabe no timeout-minutes:200) e < WAIT_HORIZON_S=4h.
    # POLITICA (Eduardo 2026-07-23): publicar SO de segunda a sexta, sempre 12:00 BRT (15:00 UTC).
    - cron: "18 12 * * 1-5"  # 12:18 UTC (09:18 BRT), seg-sex; dorme ~2h42 ate 15:00 UTC = 12:00 BRT
    # cada cron publica/espera TODOS os slots devidos -> idempotente, sem duplicar.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (nao publica, so mostra)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: publicar-reels
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 200   # o runner sobe cedo e dorme ate o publish_at exato (ate ~2h23)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publicar reels devidos
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_USER_ID: RossiterConsulting
          IG_CONNECTED_ACCOUNT_ID: ca_C8RaGOzsCic0
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: python3 scripts/publicar_reels.py
      - name: Persistir estado (published.json)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          if [ -n "$(git status --porcelain reels/published.json)" ]; then
            git config user.name "edurossiter-ops"
            git config user.email "edurossiter@gmail.com"
            git add reels/published.json
            git commit -m "reels: estado de publicacao [skip ci]"
            git push
          else
            echo "published.json sem mudancas"
          fi
