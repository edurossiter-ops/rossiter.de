name: diag-instagram
# Diagnostico temporario: lista TODAS as slugs instagram da chave e testa existencia
# das slugs de publicacao (sem publicar). Apagar apos validar.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Diagnostico instagram
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_USER_ID: RossiterConsulting
          IG_CONNECTED_ACCOUNT_ID: ca_C8RaGOzsCic0
        run: |
          python3 - <<'PY'
          import os, sys, json, urllib.request, urllib.error
          sys.path.insert(0, "scripts")
          import publicar_reels as P

          KEY = os.environ["COMPOSIO_API_KEY"]

          def get(url):
              req = urllib.request.Request(url, headers={"x-api-key": KEY})
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read().decode())

          print("=== TODAS AS SLUGS INSTAGRAM (paginado) ===")
          seen, cursor, pages = [], None, 0
          try:
              while pages < 20:
                  pages += 1
                  url = "https://backend.composio.dev/api/v3/tools?toolkit_slugs=instagram&limit=100"
                  if cursor:
                      url += "&cursor=" + urllib.request.quote(cursor)
                  data = get(url)
                  items = data.get("items") or data.get("data") or []
                  for i in items:
                      s = i.get("slug", "")
                      if "INSTAGRAM" in s or "_IG_" in s:
                          seen.append(s)
                  cursor = (data.get("next_cursor") or (data.get("pagination") or {}).get("next_cursor"))
                  if not cursor:
                      break
              ig = sorted(set(seen))
              print("INSTAGRAM SLUGS:", len(ig))
              for s in ig:
                  tag = ""
                  if "COLLAB" in s or "POST_IG_USER_MEDIA" in s:
                      tag = "  <-- candidata colaboradores"
                  print(" ", s, tag)
          except Exception as e:
              print("LIST FALHOU:", repr(e))

          print("\n=== EXISTENCIA DAS SLUGS DE PUBLICACAO (creation_id falso, nao publica) ===")
          for slug in P.PUBLISH_SLUGS + ["INSTAGRAM_POST_IG_USER_MEDIA"]:
              try:
                  P.execute(slug, {"ig_user_id": "me", "creation_id": "0"})
                  print(" ", slug, "-> EXISTE (respondeu sem erro)")
              except P.ApiError as e:
                  print(" ", slug, "-> AUSENTE (404 ToolNotFound)" if e.tool_not_found else f"-> EXISTE (erro {e.code}, nao-404)")
          PY
