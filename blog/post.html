<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · Rossiter Consulting</title>
<meta name="description" content="Notas de operação — Rossiter Consulting.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/v3.css">
</head>
<body>
<nav class="blognav">
  <a href="../index.html#hero" class="nav__brand" aria-label="Rossiter Consulting"><img src="../assets/rossiter-mark.svg" class="brandmark" alt=""><span class="brandtext"><span class="nm">Rossiter</span><span class="ds">Consulting</span></span></a>
  <a class="home" href="index.html">← Blog</a>
</nav>
<article class="article" id="art"><p style="color:var(--steel)">Carregando…</p></article>
<section class="postnews">
  <div class="news">
    <h3>Notas de operação, no seu e-mail</h3>
    <p>Recebeu valor neste texto? Receba os próximos direto no e-mail, sem ruído.</p>
    <form class="news__form" id="newsForm" aria-label="Newsletter">
      <input type="email" name="email" aria-label="E-mail para a newsletter" placeholder="seu@email.com" autocomplete="email" inputmode="email" required>
      <button type="submit" class="news__btn">Inscrever</button>
    </form>
  </div>
</section>
<footer class="footer">
  <div class="footer__top">
    <div class="footer__brand"><img src="../assets/rossiter-mark.svg" class="footmark" alt=""><div class="brandtext"><span class="nm">Rossiter</span><span class="ds">Consulting</span></div></div>
    <div class="footer__social">
      <a class="footer__btn" href="mailto:eduardo@rossiter.de"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16"/><path d="M2 6l10 7 10-7"/></svg>E-mail</a>
      <a class="footer__btn" href="https://linkedin.com/in/eduardorossiter" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20"/><path d="M7 10v7M7 7v.01M12 17v-4c0-1.1.9-2 2-2s2 .9 2 2v4"/></svg>LinkedIn</a>
      <a class="footer__btn" href="https://wa.me/4917621110258" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.4 8.4 0 0 1-12.3 7.4L3 21l2.1-5.6A8.4 8.4 0 1 1 21 11.5z"/></svg>WhatsApp</a>
    </div>
  </div>
  <p class="footer__copy">Sistema rodando · Indicador medido · Rotina funcionando &nbsp;·&nbsp; © 2026 Rossiter Consulting</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  function fmt(d){var m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];var p=d.split('-');return p[2]+' '+m[+p[1]-1]+' '+p[0];}
  var slug=new URLSearchParams(location.search).get('slug');
  var art=document.getElementById('art');
  if(!slug){art.innerHTML='<p>Post não encontrado.</p>';}
  else fetch('posts.json').then(function(r){return r.json();}).then(function(posts){
    var p=posts.find(function(x){return x.slug===slug;});
    if(!p){art.innerHTML='<a class="article__back" href="index.html">← Blog</a><p>Post não encontrado.</p>';return;}
    document.title=p.title+' · Rossiter Consulting';
    var md=document.querySelector('meta[name=description]'); if(md)md.setAttribute('content',p.excerpt);
    fetch('posts/'+slug+'.md').then(function(r){return r.text();}).then(function(body){
      art.innerHTML='<a class="article__back" href="index.html">← Blog</a>'
        +'<div class="article__meta">'+fmt(p.date)+' · '+p.readingTime+'</div>'
        +'<h1>'+p.title+'</h1>'
        +'<img class="article__cover" src="'+p.image+'" alt="">'
        +'<div class="article__body">'+(window.marked?marked.parse(body):body)+'</div>';
    });
  }).catch(function(){art.innerHTML='<p>Não foi possível carregar o post.</p>';});
</script>
<script src="../assets/news.js"></script>
</body>
</html>
